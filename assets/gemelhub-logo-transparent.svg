<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-labelledby="title desc">
  <title id="title">GemelHub transparent logo</title>
  <desc id="desc">GemelHub transparent wordmark with the Hebrew tagline: pension savings at the click of a button.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E7C965"/>
      <stop offset="1" stop-color="#C7A247"/>
    </linearGradient>
  </defs>

  <text x="190" y="140"
        text-anchor="middle"
        dominant-baseline="alphabetic"
        font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, Arial, sans-serif"
        font-size="96">&#x1F4B0;</text>

  <text x="535" y="150"
        text-anchor="middle"
        font-family="Heebo, Arial, Helvetica, sans-serif"
        font-size="118"
        font-weight="600"
        letter-spacing="-1">
    <tspan fill="#183A66">Gemel</tspan><tspan fill="url(#gold)">Hub</tspan>
  </text>

  <text x="535" y="205"
        text-anchor="middle"
        direction="rtl"
        unicode-bidi="plaintext"
        font-family="Heebo, Arial, Helvetica, sans-serif"
        font-size="36"
        font-weight="500"
        fill="#C7A247">&#1495;&#1497;&#1505;&#1499;&#1493;&#1503; &#1508;&#1504;&#1505;&#1497;&#1493;&#1504;&#1497; &#1489;&#1500;&#1495;&#1497;&#1510;&#1514; &#1499;&#1508;&#1514;&#1493;&#1512;</text>
</svg>
