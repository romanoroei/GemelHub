<svg xmlns="http://www.w3.org/2000/svg" width="720" height="184" viewBox="120 42 720 184" role="img" aria-labelledby="title desc">
  <title id="title">GemelHub print logo</title>
  <desc id="desc">GemelHub wordmark for the printed report header — solid gold instead of a gradient fill, since Android Chrome's print/PDF rasterizer can fail to resolve url() gradient references on an externally-loaded &lt;img&gt; SVG, rendering that text invisible.</desc>

  <text x="190" y="140"
        text-anchor="middle"
        dominant-baseline="alphabetic"
        font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, Arial, sans-serif"
        font-size="96">&#x1F4B0;</text>

  <text x="535" y="150"
        text-anchor="middle"
        font-family="Heebo, Arial, Helvetica, sans-serif"
        font-size="118"
        font-weight="600"
        letter-spacing="-1">
    <tspan fill="#183A66">Gemel</tspan><tspan fill="#d4a017">Hub</tspan>
  </text>

  <text x="535" y="205"
        text-anchor="middle"
        direction="rtl"
        unicode-bidi="plaintext"
        font-family="Heebo, Arial, Helvetica, sans-serif"
        font-size="36"
        font-weight="500"
        fill="#d4a017">&#1495;&#1497;&#1505;&#1499;&#1493;&#1503; &#1508;&#1504;&#1505;&#1497;&#1493;&#1504;&#1497; &#1489;&#1500;&#1495;&#1497;&#1510;&#1514; &#1499;&#1508;&#1514;&#1493;&#1512;</text>
</svg>
