name: Generate share images

on:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/share-images.yml'
      - 'scripts/**'
      - 'package.json'
      - 'js/app.js'
      - 'css/style.css'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Check latest data period
        id: period
        run: npm run share-images:check

      - name: Generate images
        if: steps.period.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          SHARE_IMAGE_PERIOD: ${{ steps.period.outputs.latest_period }}
          SHARE_IMAGE_PERIOD_RAW: ${{ steps.period.outputs.latest_raw_period }}
          SHARE_IMAGE_SITE_URL: https://romanoroei.github.io/GemelHub/
        run: npm run share-images:generate

      - name: Commit generated images
        if: steps.period.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/share-images/
          if git diff --cached --quiet; then
            echo "No share image changes to commit."
          else
            git commit -m "Generate monthly share images"
            git push
          fi
